<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Mohd Faij</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

/* BODY */
body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

.nav h2{font-size:18px;}
.nav a{color:white;text-decoration:none;}

/* PROJECT SWITCH */
.project-switch{
display:flex;
justify-content:center;
gap:15px;
padding:15px;
}

.switch-btn{
padding:10px 20px;
border-radius:20px;
background:rgba(255,255,255,0.08);
cursor:pointer;
transition:0.3s;
}

.switch-btn:hover{background:#6366f1;}
.active-switch{background:#6366f1;}

/* TABS */
.tabs{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
flex-wrap:wrap;
}

.tab{
padding:8px 16px;
border-radius:15px;
background:rgba(255,255,255,0.08);
cursor:pointer;
}

.tab.active{background:#8b5cf6;}

/* CONTAINER */
.container{padding:15px;}

iframe{
width:100%;
height:80vh;
border:none;
border-radius:12px;
animation:fade 0.4s ease;
}

@keyframes fade{
from{opacity:0;transform:scale(0.98);}
to{opacity:1;}
}

/* BUTTON */
.fallback{
text-align:center;
margin-top:10px;
}

.fallback a{
background:#6366f1;
padding:10px 20px;
border-radius:20px;
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<h2>📊 Dashboard Viewer</h2>
<a href="index.html">⬅ Back</a>
</div>

<!-- PROJECT SWITCH -->
<div class="project-switch">

<div class="switch-btn active-switch" onclick="switchProject('telecom', this)">
Telecom Project
</div>

<div class="switch-btn" onclick="switchProject('enterprise', this)">
Enterprise Project
</div>

</div>

<!-- TELECOM TABS -->
<div id="telecomTabs" class="tabs">

<div class="tab active" onclick="loadTelecom('overview', this)">Overview</div>
<div class="tab" onclick="loadTelecom('insights', this)">Insights</div>
<div class="tab" onclick="loadTelecom('churn', this)">Churn</div>
<div class="tab" onclick="loadTelecom('strategy', this)">Strategy</div>

</div>

<!-- DASHBOARD -->
<div class="container">
<iframe id="frame"></iframe>

<div class="fallback">
<a id="openLink" target="_blank">🔗 Open in New Tab</a>
</div>
</div>

<script>

/* 🖼️ TELECOM IMAGES (4 PAGES) */
const telecomImages = {
overview: "executive-overview.png",
insights: "customer-insights.png",
churn: "churn-analysis.png",
strategy: "retention-strategy.png"
};

/* 🔗 LINKS (ONLY 1 PER PROJECT) */
const telecomLink = "PASTE_TELECOM_LINK";
const enterpriseLink = "PASTE_ENTERPRISE_LINK";

/* 🖼️ ENTERPRISE IMAGE */
const enterpriseImage = "enterprise-dashboard.png";

/* DEFAULT LOAD */
loadTelecom('overview', document.querySelector('.tab'));

/* SWITCH PROJECT */
function switchProject(type, el){

document.querySelectorAll(".switch-btn").forEach(b=>b.classList.remove("active-switch"));
el.classList.add("active-switch");

if(type === "telecom"){
document.getElementById("telecomTabs").style.display="flex";
loadTelecom('overview', document.querySelector('.tab'));
}
else{
document.getElementById("telecomTabs").style.display="none";

document.getElementById("previewImg").src = enterpriseImage;
document.getElementById("openLink").href = enterpriseLink;
}

}

/* TELECOM TAB SWITCH */
function loadTelecom(page, el){

document.getElementById("previewImg").src = telecomImages[page];
document.getElementById("openLink").href = telecomLink;

/* ACTIVE TAB */
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");

}

</script>

</body>
</html>
