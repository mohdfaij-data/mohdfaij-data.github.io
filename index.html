body{

/* NAVBAR */
nav{

  padding:20px;
  background:white;

  max-width:500px;
  margin:auto;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  border-radius:10px;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#6366f1;
  color:white;
  cursor:pointer;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  background:#4f46e5;

/* FOOTER */
footer{

  background:white;
