<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mohd Faij | Data Analyst</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:#f8fafc;
  color:#0f172a;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:center;
  gap:40px;
  padding:20px;
  background:white;
  border-bottom:1px solid #e2e8f0;
  position:sticky;
  top:0;
}

nav a{
  text-decoration:none;
  color:#334155;
  font-weight:500;
}

/* PROJECT SECTION */
.projects{
  padding:60px 20px;
  text-align:center;
}

.card{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  max-width:500px;
  margin:auto;
}

.card img{
  width:100%;
  border-radius:10px;
}

.btn{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  z-index:1000;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);
  justify-content:center;
  align-items:center;
}

.modal-content{
  width:90%;
  height:80%;
  background:white;
  border-radius:12px;
  overflow:hidden;
  position:relative;
}

.modal iframe{
  width:100%;
  height:100%;
  border:none;
}

/* CLOSE BUTTON */
.close{
  position:absolute;
  top:10px;
  right:20px;
  font-size:28px;
  cursor:pointer;
  color:#111;
  z-index:10;
}

/* FALLBACK BUTTON */
.fallback{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  font-size:14px;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#">Home</a>
  <a href="#">Projects</a>
</nav>

<!-- PROJECT -->
<section class="projects">

  <h2>My Projects</h2>

  <div class="card">
    <h3>Telecom Customer Churn Analysis</h3>

    <img src="https://via.placeholder.com/500x250">

    <button class="btn" onclick="openModal()">View Live Dashboard</button>
  </div>

</section>

<!-- MODAL -->
<div id="dashboardModal" class="modal">

  <div class="modal-content">

    <span class="close" onclick="closeModal()">&times;</span>

    <!-- TRY EMBED -->
    <iframe 
      src="https://app.powerbi.com/view?r=eyJrIjoiNGM0OGMxN2UtMjdjYy00YzRkLWE5NTMtNzRhMDAyZjJkODZkIiwidCI6IjNkMGE5Y2FiLTQzYzYtNDlkNi1iODZjLTFiMTZjNGQwMjYzNSJ9&pageName=40ed3e03483196c0b5e2">
    </iframe>

    <!-- FALLBACK -->
    <div class="fallback">
      If dashboard not loading 👉 
      <a href="https://app.powerbi.com/view?r=eyJrIjoiNGM0OGMxN2UtMjdjYy00YzRkLWE5NTMtNzRhMDAyZjJkODZkIiwidCI6IjNkMGE5Y2FiLTQzYzYtNDlkNi1iODZjLTFiMTZjNGQwMjYzNSJ9&pageName=40ed3e03483196c0b5e2" target="_blank" style="color:#60a5fa;">
        Open in new tab
      </a>
    </div>

  </div>

</div>

<!-- JS -->
<script>

function openModal(){
  document.getElementById("dashboardModal").style.display = "flex";
}

function closeModal(){
  document.getElementById("dashboardModal").style.display = "none";
}

</script>

</body>
</html>
